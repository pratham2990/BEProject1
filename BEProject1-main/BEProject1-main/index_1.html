<!DOCTYPE html>
<html>
<head>
    <title>Robot Control</title>
    <style>
        body { text-align: center; font-family: Arial; }
        button {
            width: 120px;
            height: 50px;
            margin: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h2>Robot Control Panel</h2>

<h3>Live Camera</h3>
<img src="/video" width="400">

<br><br>

<button onmousedown="setControl(200,1,200,1)" onmouseup="stop()">Forward</button><br>
<button onmousedown="setControl(100,0,100,1)" onmouseup="stop()">Left</button>
<button onclick="stop()">Stop</button>
<button onmousedown="setControl(100,1,100,0)" onmouseup="stop()">Right</button><br>
<button onmousedown="setControl(200,0,200,0)" onmouseup="stop()">Backward</button>

<script>
function setControl(ls, ld, rs, rd) {
    send(ls, ld, rs, rd);
}

function stop() {
    send(0,0,0,0);
}

function send(ls, ld, rs, rd) {
    fetch('/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `ls=${ls}&ld=${ld}&rs=${rs}&rd=${rd}`
    });
}
</script>

</body>
</html>
